<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Profile Modal Test</title>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .test-button {
            background: #B8860B;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 20px 0;
        }
        
        .test-button:hover {
            background: #9a7408;
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999999;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            position: relative;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }
        
        .close-button {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        
        .close-button:hover {
            color: #000;
        }
        
        h1 {
            color: #B8860B;
            margin-top: 0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        
        .save-button {
            background: #16A085;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .save-button:hover {
            background: #138d75;
        }
    </style>
</head>
<body>
    <h1>ทดสอบ Profile Modal</h1>
    <button class="test-button" onclick="showProfileModal()">แสดงข้อมูลส่วนตัว</button>
    
    <div id="profileModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-button" onclick="hideProfileModal()">&times;</span>
            <h1>ข้อมูลส่วนตัว</h1>
            
            <div class="form-group">
                <label for="name">ชื่อผู้ใช้งาน</label>
                <input type="text" id="name" value="Test User" readonly>
            </div>
            
            <div class="form-group">
                <label for="email">อีเมล</label>
                <input type="email" id="email" value="test@example.com" readonly>
            </div>
            
            <div class="form-group">
                <label for="password">รหัสผ่านใหม่</label>
                <input type="password" id="password" placeholder="กรอกรหัสผ่านใหม่">
            </div>
            
            <div class="form-group">
                <label for="confirm-password">ยืนยันรหัสผ่าน</label>
                <input type="password" id="confirm-password" placeholder="ยืนยันรหัสผ่านใหม่">
            </div>
            
            <button class="save-button" onclick="saveProfile()">บันทึกข้อมูล</button>
        </div>
    </div>
    
    <script>
        function showProfileModal() {
            console.log('Showing profile modal...');
            const modal = document.getElementById('profileModal');
            modal.style.display = 'flex';
            console.log('Modal display:', modal.style.display);
        }
        
        function hideProfileModal() {
            console.log('Hiding profile modal...');
            const modal = document.getElementById('profileModal');
            modal.style.display = 'none';
        }
        
        function saveProfile() {
            alert('บันทึกข้อมูลเรียบร้อย!');
            hideProfileModal();
        }
        
        // ปิด modal เมื่อคลิกนอกกล่อง
        document.getElementById('profileModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideProfileModal();
            }
        });
    </script>
</body>
</html>
