<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบข้อมูลส่วนตัว</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #B8860B;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        
        .section-title {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #B8860B;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #B8860B;
        }
        
        .form-group input[readonly] {
            background: #f5f5f5;
            color: #666;
        }
        
        .small-text {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .alert-section {
            background: #f9f9f9;
        }
        
        .forecast-section {
            background: #f0f8ff;
        }
        
        .btn {
            background: #B8860B;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #9a7408;
        }
        
        .btn-success {
            background: #16A085;
        }
        
        .btn-success:hover {
            background: #138d75;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .btn-group input {
            flex: 1;
        }
        
        .status-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .table th {
            background: #e8f4f8;
            font-weight: bold;
            color: #333;
        }
        
        .table tr:hover {
            background: #f9f9f9;
        }
        
        .trend-up {
            color: #16A085;
            font-weight: bold;
        }
        
        .trend-down {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .trend-stable {
            color: #f39c12;
            font-weight: bold;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .back-btn {
            background: #6c757d;
        }
        
        .back-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 ระบบข้อมูลส่วนตัว</h1>
            <p>จัดการข้อมูลผู้ใช้ การแจ้งเตือน และประวัติการพยากรณ์</p>
        </div>
        
        <!-- ข้อมูลผู้ใช้ -->
        <div class="section">
            <h2 class="section-title">👤 ข้อมูลผู้ใช้</h2>
            <div class="form-group">
                <label for="userName">ชื่อผู้ใช้งาน</label>
                <input type="text" id="userName" placeholder="กรอกชื่อของคุณ">
            </div>
            <div class="form-group">
                <label for="userEmail">อีเมล</label>
                <input type="email" id="userEmail" readonly>
                <small class="small-text">* ไม่สามารถแก้ไขได้</small>
            </div>
        </div>
        
        <!-- การแจ้งเตือนราคาทอง -->
        <div class="section alert-section">
            <h2 class="section-title">🔔 การแจ้งเตือนราคาทอง</h2>
            <div class="form-group">
                <label for="alertPrice">ตั้งค่าราคาทองเมื่อถึง</label>
                <div class="btn-group">
                    <input type="number" id="alertPrice" placeholder="ระบุราคาทอง (บาท)">
                    <button class="btn btn-success" onclick="saveAlert()">บันทึก</button>
                </div>
                <small class="small-text">* จะแจ้งเตือนเมื่อราคาทองถึงระดับที่ตั้งไว้</small>
            </div>
            <div id="alertStatus"></div>
        </div>
        
        <!-- ประวัติการพยากรณ์ -->
        <div class="section forecast-section">
            <h2 class="section-title">📈 ประวัติการพยากรณ์ราคาทอง</h2>
            <div id="forecastHistory">
                <p style="color: #666; text-align: center;">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
        
        <div class="footer">
            <button class="btn back-btn" onclick="goBack()">🔙 กลับไปหน้าหลัก</button>
        </div>
    </div>
    
    <script>
        // ดึงข้อมูลผู้ใช้จาก localStorage
        function getCurrentUser() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                try {
                    return JSON.parse(savedUser);
                } catch (e) {
                    console.error('Error parsing user data:', e);
                    return { name: 'ผู้ใช้ทั่วไป', email: 'user@example.com' };
                }
            }
            return { name: 'ผู้ใช้ทั่วไป', email: 'user@example.com' };
        }
        
        let currentUser = getCurrentUser();
        
        // โหลดข้อมูลเมื่อเปิดหน้า
        window.onload = function() {
            loadUserData();
            loadAlertSettings();
            loadForecastHistory();
        };
        
        // โหลดข้อมูลผู้ใช้
        function loadUserData() {
            document.getElementById('userName').value = currentUser.name || '';
            document.getElementById('userEmail').value = currentUser.email || '';
        }
        
        // บันทึกการแจ้งเตือน
        function saveAlert() {
            const alertPrice = document.getElementById('alertPrice').value;
            const statusDiv = document.getElementById('alertStatus');
            
            if (!alertPrice) {
                showStatus('alertStatus', 'กรุณาระบุราคาที่ต้องการแจ้งเตือน', 'error');
                return;
            }
            
            // บันทึกลง localStorage
            localStorage.setItem('goldAlertPrice', alertPrice);
            showStatus('alertStatus', `บันทึกการแจ้งเตือนราคาทองที่ ${Number(alertPrice).toLocaleString()} บาท เรียบร้อย`, 'success');
        }
        
        // โหลดการตั้งค่าแจ้งเตือน
        function loadAlertSettings() {
            const savedAlert = localStorage.getItem('goldAlertPrice');
            if (savedAlert) {
                document.getElementById('alertPrice').value = savedAlert;
            }
        }
        
        // โหลดประวัติการพยากรณ์
        function loadForecastHistory() {
            const historyDiv = document.getElementById('forecastHistory');
            
            // ข้อมูลจำลอง
            const mockHistory = [
                { date: '12/02/2026 10:00', price: '35,200', trend: 'ขึ้น', accuracy: '85%' },
                { date: '12/02/2026 08:00', price: '35,150', trend: 'ลง', accuracy: '82%' },
                { date: '11/02/2026 18:00', price: '35,180', trend: 'ขึ้น', accuracy: '88%' },
                { date: '11/02/2026 14:00', price: '35,120', trend: 'คงที่', accuracy: '90%' },
                { date: '11/02/2026 10:00', price: '35,050', trend: 'ลง', accuracy: '87%' }
            ];
            
            if (mockHistory.length === 0) {
                historyDiv.innerHTML = '<p style="color: #666; text-align: center;">ยังไม่มีประวัติการพยากรณ์</p>';
            } else {
                let html = '<table class="table">';
                html += '<thead><tr>';
                html += '<th>วันที่/เวลา</th>';
                html += '<th style="text-align: center;">ราคาพยากรณ์</th>';
                html += '<th style="text-align: center;">แนวโน้ม</th>';
                html += '<th style="text-align: center;">ความแม่นยำ</th>';
                html += '</tr></thead><tbody>';
                
                mockHistory.forEach(item => {
                    const trendClass = item.trend === 'ขึ้น' ? 'trend-up' : (item.trend === 'ลง' ? 'trend-down' : 'trend-stable');
                    html += '<tr>';
                    html += `<td>${item.date}</td>`;
                    html += `<td style="text-align: center;">${item.price}</td>`;
                    html += `<td style="text-align: center;" class="${trendClass}">${item.trend}</td>`;
                    html += `<td style="text-align: center;">${item.accuracy}</td>`;
                    html += '</tr>';
                });
                
                html += '</tbody></table>';
                historyDiv.innerHTML = html;
            }
        }
        
        // แสดงสถานะ
        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status-message status-${type}">${message}</div>`;
            
            // ล้างข้อความหลัง 3 วินาที
            setTimeout(() => {
                element.innerHTML = '';
            }, 3000);
        }
        
        // กลับไปหน้าหลัก
        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
