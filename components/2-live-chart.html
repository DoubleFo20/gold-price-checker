<div class="section" id="gold-chart-section">
    <div
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
        <h2 style="margin: 0;">กราฟราคาทองคำ เรียลไทม์</h2>
        <div class="chart-toggle-group">
            <button id="toggle-thai-chart" class="chart-toggle-btn active">กราฟราคาทองไทย</button>
            <button id="toggle-world-chart" class="chart-toggle-btn">กราฟราคาทองโลก</button>
        </div>
    </div>

    <!-- Thai Gold Real-time Chart (Chart.js) -->
    <div id="thai-live-container" style="width: 100%; height: 500px; display: block; position: relative;">
        <!-- Time Range Buttons -->
        <div class="chart-time-range-group"
            style="display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px;">
            <button class="time-range-btn active" data-range="1d">1D</button>
            <button class="time-range-btn" data-range="5d">5D</button>
            <button class="time-range-btn" data-range="1w">1W</button>
            <button class="time-range-btn" data-range="1mo">1M</button>
        </div>
        <!-- Chart Canvas -->
        <div style="height: calc(100% - 40px); width: 100%;">
            <canvas id="thai-live-chart"></canvas>
        </div>
    </div>

    <!-- World Gold Chart (TradingView) -->
    <div id="world-live-container" class="tradingview-widget-container"
        style="width: 100%; height: 500px; display: none;">
        <div id="tradingview_full_chart" style="height:100%;"></div>
        <div class="tradingview-widget-copyright">
            <a href="https://th.tradingview.com/symbols/XAUUSD/" rel="noopener nofollow" target="_blank">
                <span class="blue-text">XAUUSD Chart</span>
            </a> by TradingView
        </div>
    </div>
</div>
